name: STL Release

# Watches the STLs/ tree and, on any change there, builds two zip bundles
# (the LDO kit list and a secondary list) and publishes them as the
# "latest" GitHub Release, overwriting the previous one.

on:
  push:
    branches:
      - main
    paths:
      - 'STLs/**'
  workflow_dispatch:  # also allow manual runs from the Actions tab

permissions:
  contents: write  # required to create/update releases and upload assets

jobs:
  zip-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create STL bundle
        run: |
          set -euo pipefail

          # ---- Zip up ALL stls ----
          # Entries ending with /** are treated as directories and zipped
          # recursively. Brackets in filenames (e.g. [a]_foo.stl) are
          # handled literally because we use quoted array expansion and
          # never let the shell glob-expand these strings.
          FILES=(
            'STLs/**'
          )

          # Build the final list: strip trailing /** for directory entries,
          # validate everything exists, and fail loudly on typos.
          TO_ZIP=()
          MISSING=0
          for entry in "${FILES[@]}"; do
            if [[ "$entry" == *"/**" ]]; then
              dir="${entry%"/**"}"
              if [ ! -d "$dir" ]; then
                echo "::error::Directory not found: $dir"
                MISSING=1
              else
                TO_ZIP+=( "$dir" )
              fi
            else
              if [ ! -e "$entry" ]; then
                echo "::error::File not found: $entry"
                MISSING=1
              else
                TO_ZIP+=( "$entry" )
              fi
            fi
          done
          if [ "$MISSING" -ne 0 ]; then
            exit 1
          fi

          echo "Zipping ${#TO_ZIP[@]} entry/entries..."
          # Quoted expansion — bash does NOT glob-expand, so [a]_foo.stl
          # is passed literally to zip.
          zip -r micron-stls.zip "${TO_ZIP[@]}"

